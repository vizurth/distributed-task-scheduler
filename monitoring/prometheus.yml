global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api-service'
    static_configs:
      - targets: ['api-service:8001']
    metrics_path: '/metrics'
    scrape_interval: 5s
  - job_name: 'processor'
    static_configs:
      - targets: [ 'processor:8002' ]
    metrics_path: '/metrics'
    scrape_interval: 5s